global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "telemetry-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "device-telemetry-ml"
          environment: "production"

  - job_name: "telemetry-api-docker"
    metrics_path: /metrics
    static_configs:
      - targets: ["telemetry-api:8000"]
        labels:
          service: "device-telemetry-ml"
          environment: "docker"
