version: "3.8"

services:
  # ─── Blue (Current Stable) ─────────────────────────────
  telemetry-api-blue:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: telemetry-api-blue
    ports:
      - "8001:8000"
    environment:
      - MODEL_VERSION=blue
    restart: unless-stopped

  # ─── Green (New Version) ───────────────────────────────
  telemetry-api-green:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: telemetry-api-green
    ports:
      - "8002:8000"
    environment:
      - MODEL_VERSION=green
    restart: unless-stopped

  # ─── Nginx Router ──────────────────────────────────────
  nginx-router:
    image: nginx:alpine
    container_name: nginx-router
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - telemetry-api-blue
      - telemetry-api-green
    restart: unless-stopped

  # ─── Monitoring ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
