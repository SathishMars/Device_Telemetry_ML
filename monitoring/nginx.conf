events {
    worker_connections 1024;
}

http {
    upstream telemetry_api {
        # Blue-Green routing weights
        # To switch: change weights and reload nginx
        # docker exec nginx-router nginx -s reload
        server telemetry-api-blue:8000  weight=1;   # 100% traffic
        server telemetry-api-green:8000 weight=0 backup;  # 0% traffic
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://telemetry_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://telemetry_api/health;
        }

        location /metrics {
            proxy_pass http://telemetry_api/metrics;
        }
    }
}
